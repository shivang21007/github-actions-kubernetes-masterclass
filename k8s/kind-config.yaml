# kind cluster for SkillPulse + ingress-nginx.
#
# extraPortMappings: host (your laptop) -> port on the kind "node" container.
# containerPort must match INGRESS_HTTP_HOSTPORT in the Makefile (controller hostPort patch).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: skillpulse
nodes:
  - role: control-plane
    image: kindest/node:v1.35.1
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30060
        hostPort: 8060
        protocol: TCP
        listenAddress: "0.0.0.0"
  - role: worker
    image: kindest/node:v1.35.1
  - role: worker
    image: kindest/node:v1.35.1
