name: Deploy to kind cluster

# App / workflow changes: CI → bump image tags in manifests → SSH kubectl apply.
# Commits under k8s/** only → use k8s-apply.yml instead (deploy only).

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

# Reusable workflows cannot grant broader token scope than their caller.
# modify-k8s.yml git-pushes pinned manifests → needs contents: write here too.
permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  k8s-manifest-bump:
    needs: [ci]
    uses: ./.github/workflows/modify-k8s.yml
    secrets: inherit
    with:
      head_sha: ${{ github.sha }}

  deploy:
    name: SSH to server and deploy
    needs: [k8s-manifest-bump]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH into server and apply manifests
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            if [ ! -d ~/github-actions-kubernetes-masterclass ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git ~/github-actions-kubernetes-masterclass
            fi
            cd ~/github-actions-kubernetes-masterclass
            git pull origin main

            kubectl apply -f k8s/00-namespace.yaml
            kubectl apply -f k8s/10-mysql.yaml
            kubectl apply -f k8s/20-backend.yaml
            kubectl apply -f k8s/30-frontend.yaml
            kubectl apply -f k8s/40-ingress.yaml
