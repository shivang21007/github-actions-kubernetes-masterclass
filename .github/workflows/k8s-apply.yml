name: Deploy manifests (k8s only)

# Simple path filter: pushes that touch manifests but not triggered by cd.yml (which ignores k8s/**).
#
# Caveat: if one commit changes both app code and k8s/, BOTH this workflow AND cd.yml
# run (two kubectl applies). Prefer separate commits, or tolerate duplicate apply.

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'

jobs:
  deploy:
    name: SSH to server and apply manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            if [ ! -d ~/github-actions-kubernetes-masterclass ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git ~/github-actions-kubernetes-masterclass
            fi
            cd ~/github-actions-kubernetes-masterclass
            git pull origin main

            kubectl apply -f k8s/00-namespace.yaml
            kubectl apply -f k8s/10-mysql.yaml
            kubectl apply -f k8s/20-backend.yaml
            kubectl apply -f k8s/30-frontend.yaml
            kubectl apply -f k8s/40-ingress.yaml
