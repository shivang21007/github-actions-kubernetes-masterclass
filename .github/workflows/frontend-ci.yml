name: Frontend CI Pipeline

permissions:
  contents: read
  actions: write

on:
  # This workflow is called by the ci.yml workflow
  workflow_call:

  # This workflow is triggered manually
  workflow_dispatch:

jobs:
  dockerfile-linting:
    name: Run Hadolint for Dockerfiles Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          ignore: DL3018,DL3008,DL3017

  build-scan-push:
    name: Build, Scan, and Push Frontend Image
    runs-on: ubuntu-latest
    needs: [dockerfile-linting]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image locally
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          load: true
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
