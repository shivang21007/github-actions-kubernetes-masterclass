name: k8s (manifest bump)

on:
  workflow_call:
    inputs:
      head_sha:
        description: Commit SHA to pin in manifests (same tag as Docker images from CI).
        required: true
        type: string

jobs:
  bump-manifests:
    name: Pin backend & frontend image tags in manifests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pin backend + frontend images to CI commit SHA
        env:
          SHA: ${{ inputs.head_sha }}
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "$DOCKER_USER" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is not set."
            exit 1
          fi
          sed -i -E "s|^([[:space:]]*)image:.*skillpulse-backend.*|\1image: $DOCKER_USER/skillpulse-backend:$SHA|" k8s/20-backend.yaml
          sed -i -E "s|^([[:space:]]*)image:.*skillpulse-frontend.*|\1image: $DOCKER_USER/skillpulse-frontend:$SHA|" k8s/30-frontend.yaml

      - name: Commit and push if manifests changed
        env:
          SHA: ${{ inputs.head_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Manifests already pinned to ${SHA}; nothing to commit."
            exit 0
          fi
          git add k8s/20-backend.yaml k8s/30-frontend.yaml
          git commit -m "deploy: pin backend+frontend to ${SHA:0:7}"
          git push
